spring:
  application:
    name: booktracker
  datasource:
    url: jdbc:postgresql://localhost:5432/booktracker
    username: booktracker
    password: booktracker_dev
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

app:
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-key-minimum-256-bits-long-change-in-prod}
    access-token-expiration: 900000
    refresh-token-expiration: 604800000